<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pega Comic</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel" aria-labelledby="app-title">
        <div class="title-area">
          <h1 id="app-title" class="app-title">
            <img src="assets/pegacomic-title.jpg" alt="PegaComic">
          </h1>
        </div>

        <div class="quick-actions" aria-label="Comic actions">
          <button id="newButton" type="button">New</button>
          <h2 id="selectionHint" class="toolbar-heading">Editing panel 1</h2>
          <button id="uploadButton" class="primary-action" type="button">+ Picture</button>
          <button id="bubbleButton" type="button">+ Bubble</button>
          <button id="deleteBubbleButton" class="danger" type="button" hidden>Delete</button>
          <button id="exportButton" class="export-action" type="button">Export</button>
        </div>
      </section>

      <section class="workspace" aria-label="Comic builder">
        <div class="page-stage">
          <div id="comicPage" class="comic-page" aria-label="Comic page"></div>
        </div>
      </section>

      <footer class="app-footer">
        <a class="qr-link" href="https://pablonete.github.io/pegacomic/" aria-label="Open Pega Comic website">
          <img src="assets/pegacomic-qr.png" alt="QR code for the Pega Comic website">
        </a>
        <p>
          Made with love by
          <a href="https://github.com/pablonete" target="_blank" rel="noreferrer">@pablonete</a>
          for the
          <a href="https://github.com/opensouthcode/2026/issues/46" target="_blank" rel="noreferrer">OpenSouthKids 2026</a>
        </p>
      </footer>
    </main>

    <input id="imageInput" type="file" accept="image/*" hidden>
    <dialog id="newComicDialog" class="new-comic-dialog">
      <form method="dialog" class="new-comic-card">
        <div>
          <p class="dialog-kicker">New comic</p>
        </div>

        <div id="layoutPicker" class="layout-picker" aria-label="Select comic grid size"></div>

        <div class="dialog-actions">
          <button id="cancelNewComicButton" type="button">Cancel</button>
        </div>
      </form>
    </dialog>
    <script src="app.js"></script>
  </body>
</html>
